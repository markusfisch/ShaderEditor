name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or commit SHA to build
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK CLI
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager --install "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Generate CI release keystore
        run: |
          store_password="$(openssl rand -hex 16)"
          key_password="$(openssl rand -hex 16)"
          keystore_path="$RUNNER_TEMP/ci-release.keystore"

          echo "::add-mask::$store_password"
          echo "::add-mask::$key_password"

          {
            echo "ci_keystore_path=$keystore_path"
            echo "ci_store_password=$store_password"
            echo "ci_key_password=$key_password"
          } >> "$GITHUB_ENV"

          keytool -genkeypair \
            -alias ci-release \
            -keyalg RSA \
            -keysize 2048 \
            -validity 3650 \
            -storetype PKCS12 \
            -keystore "$keystore_path" \
            -storepass "$store_password" \
            -keypass "$key_password" \
            -dname "CN=ShaderEditor CI,O=ShaderEditor,C=US"

      - name: Build release APK
        env:
          ANDROID_KEY_ALIAS: ci-release
          ANDROID_KEY_PASSWORD: ${{ env.ci_key_password }}
          ANDROID_STORE_PASSWORD: ${{ env.ci_store_password }}
          ANDROID_KEYFILE: ${{ env.ci_keystore_path }}
        run: ./gradlew assembleRelease

      - name: Archive release APK in repository
        run: |
          set -euo pipefail
          apk_path="app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$apk_path" ]; then
            echo "Release APK not found at $apk_path" >&2
            exit 1
          fi
          timestamp="$(date -u +'%Y%m%dT%H%M%SZ')"
          mkdir -p releases
          release_file="releases/shadereditor-release-${timestamp}.apk"
          cp "$apk_path" "$release_file"
          echo "release_file=$release_file" >> "$GITHUB_ENV"

      - name: Commit release APK
        run: |
          set -euo pipefail
          target_ref="${{ inputs.ref || github.ref_name }}"

          case "$target_ref" in
            refs/heads/*)
              target_branch="${target_ref#refs/heads/}"
              ;;
            refs/tags/*)
              echo "Skipping APK commit for tag ref $target_ref."
              exit 0
              ;;
            *)
              if ! git show-ref --verify --quiet "refs/remotes/origin/$target_ref"; then
                echo "Skipping APK commit for non-branch ref $target_ref."
                exit 0
              fi
              target_branch="$target_ref"
              ;;
          esac

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$release_file"
          git commit -m "Add release APK ${release_file##*/}"
          git push origin HEAD:"refs/heads/$target_branch"

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: shadereditor-release-apk
          path: ${{ env.release_file }}
          if-no-files-found: error
