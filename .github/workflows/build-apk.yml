name: Build Android APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK CLI
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager --install "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Generate CI release keystore
        run: |
          keytool -genkeypair \
            -alias ci-release \
            -keyalg RSA \
            -keysize 2048 \
            -validity 3650 \
            -storetype PKCS12 \
            -keystore "$RUNNER_TEMP/ci-release.keystore" \
            -storepass android \
            -keypass android \
            -dname "CN=ShaderEditor CI,O=ShaderEditor,C=US"

      - name: Build release APK
        env:
          ANDROID_KEY_ALIAS: ci-release
          ANDROID_KEY_PASSWORD: android
          ANDROID_STORE_PASSWORD: android
          ANDROID_KEYFILE: ${{ runner.temp }}/ci-release.keystore
        run: ./gradlew assembleRelease

      - name: Archive release APK in repository
        run: |
          timestamp="$(date -u +'%Y%m%d-%H%M%S')"
          mkdir -p releases
          release_file="releases/shadereditor-release-${timestamp}.apk"
          cp app/build/outputs/apk/release/app-release.apk "$release_file"
          echo "release_file=$release_file" >> "$GITHUB_ENV"

      - name: Commit release APK
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$release_file"
          git commit -m "Add release APK ${release_file##*/}"
          git push

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: shadereditor-release-apk
          path: ${{ env.release_file }}
          if-no-files-found: error
